services:
  vhs-recorder:
    build: .
    image: vhs-recorder:latest
    container_name: vhs-recorder
    restart: unless-stopped
    ports:
      - "5000:5000"
    devices:
      - /dev/video0:/dev/video0
      - /dev/snd:/dev/snd
    group_add:
      - video
      - audio
    volumes:
      - /mnt/vhs-disk/vhs-captures:/mnt/vhs-disk/vhs-captures
      - ./config.json:/app/config.json
      # rclone OAuth config: ejecuta `rclone config` en el host una vez,
      # dejando la config en /root/.config/rclone/rclone.conf
      - /root/.config/rclone:/root/.config/rclone
    cpu_shares: 1024
    ulimits:
      rtprio: 99
